services:
  postgres:
    image: postgres:16
    container_name: ai_board_postgres
    restart: unless-stopped
    # 로컬 개발용 계정 정보입니다. 운영 환경에서는 이 값을 재사용하지 않습니다.
    environment:
      POSTGRES_DB: ai_board
      POSTGRES_USER: ai_board_user
      POSTGRES_PASSWORD: ai_board_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
