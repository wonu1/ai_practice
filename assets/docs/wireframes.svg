<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1280" viewBox="0 0 1600 1280">
  <defs>
    <style>
      .bg { fill: #f6f7f9; }
      .board { fill: #ffffff; stroke: #20242a; stroke-width: 2; }
      .panel-title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .label { font: 600 17px Arial, sans-serif; fill: #111827; }
      .small { font: 14px Arial, sans-serif; fill: #374151; }
      .tiny { font: 12px Arial, sans-serif; fill: #4b5563; }
      .muted { fill: #f0f2f5; stroke: #9ca3af; stroke-width: 1.5; }
      .field { fill: #ffffff; stroke: #9ca3af; stroke-width: 1.5; }
      .button { fill: #111827; stroke: #111827; stroke-width: 1.5; }
      .button-text { font: 600 14px Arial, sans-serif; fill: #ffffff; }
      .outline-button { fill: #ffffff; stroke: #111827; stroke-width: 1.5; }
      .outline-text { font: 600 14px Arial, sans-serif; fill: #111827; }
      .accent { fill: #e8f0fe; stroke: #4f7cff; stroke-width: 1.5; }
      .ai { fill: #fff7ed; stroke: #f97316; stroke-width: 1.5; }
      .line { stroke: #6b7280; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1280"/>
  <text class="panel-title" x="60" y="56">AI 개발 Q&amp;A 게시판 와이어프레임 v0.1</text>
  <text class="small" x="60" y="84">목적: React 화면 구현 전에 주요 화면 배치와 사용자 흐름을 시각적으로 확인한다.</text>

  <!-- Posts list -->
  <g transform="translate(60 120)">
    <rect class="board" x="0" y="0" width="700" height="320" rx="8"/>
    <text class="panel-title" x="24" y="42">/posts 게시글 목록</text>

    <rect class="field" x="24" y="66" width="380" height="38" rx="4"/>
    <text class="small" x="40" y="91">검색어 입력</text>
    <rect class="outline-button" x="416" y="66" width="92" height="38" rx="4"/>
    <text class="outline-text" x="445" y="91">검색</text>
    <rect class="button" x="560" y="66" width="116" height="38" rx="4"/>
    <text class="button-text" x="589" y="91">글쓰기</text>

    <rect class="accent" x="24" y="124" width="96" height="30" rx="15"/>
    <text class="tiny" x="48" y="144">fastapi</text>
    <rect class="accent" x="132" y="124" width="82" height="30" rx="15"/>
    <text class="tiny" x="157" y="144">react</text>
    <rect class="accent" x="226" y="124" width="70" height="30" rx="15"/>
    <text class="tiny" x="249" y="144">rag</text>

    <g transform="translate(24 174)">
      <rect class="muted" x="0" y="0" width="652" height="44" rx="4"/>
      <text class="label" x="16" y="27">FastAPI CORS 에러 질문</text>
      <text class="tiny" x="438" y="27">wonu · 댓글 2 · fastapi</text>
    </g>
    <g transform="translate(24 226)">
      <rect class="muted" x="0" y="0" width="652" height="44" rx="4"/>
      <text class="label" x="16" y="27">RAG와 벡터DB 차이 정리</text>
      <text class="tiny" x="438" y="27">helper · 댓글 5 · rag</text>
    </g>
    <text class="small" x="302" y="302">‹ 1 2 3 ›</text>
  </g>

  <!-- Post detail -->
  <g transform="translate(840 120)">
    <rect class="board" x="0" y="0" width="700" height="320" rx="8"/>
    <text class="panel-title" x="24" y="42">/posts/:postId 게시글 상세</text>

    <text class="label" x="24" y="82">FastAPI CORS 에러 질문</text>
    <text class="tiny" x="24" y="108">작성자 wonu · fastapi, cors · 2026-06-08</text>
    <rect class="outline-button" x="500" y="70" width="72" height="34" rx="4"/>
    <text class="outline-text" x="524" y="92">수정</text>
    <rect class="outline-button" x="584" y="70" width="72" height="34" rx="4"/>
    <text class="outline-text" x="608" y="92">삭제</text>

    <rect class="field" x="24" y="128" width="652" height="72" rx="4"/>
    <text class="small" x="40" y="158">React에서 FastAPI API를 호출할 때 CORS 에러가 납니다.</text>
    <text class="small" x="40" y="182">설정 위치와 원인을 알고 싶습니다.</text>

    <text class="label" x="24" y="232">댓글</text>
    <rect class="muted" x="24" y="246" width="652" height="34" rx="4"/>
    <text class="tiny" x="40" y="268">helper: CORSMiddleware 설정을 확인해보세요.</text>
    <rect class="field" x="24" y="288" width="520" height="24" rx="4"/>
    <rect class="button" x="556" y="288" width="120" height="24" rx="4"/>
    <text class="button-text" x="602" y="305">등록</text>
  </g>

  <!-- New post with AI helper -->
  <g transform="translate(60 500)">
    <rect class="board" x="0" y="0" width="700" height="420" rx="8"/>
    <text class="panel-title" x="24" y="42">/posts/new 게시글 작성</text>

    <text class="small" x="24" y="76">제목</text>
    <rect class="field" x="24" y="86" width="652" height="38" rx="4"/>
    <text class="small" x="40" y="111">FastAPI CORS 에러 질문</text>

    <text class="small" x="24" y="152">본문</text>
    <rect class="field" x="24" y="162" width="652" height="120" rx="4"/>
    <text class="tiny" x="40" y="190">에러 메시지, 실행 환경, 시도한 방법을 작성한다.</text>

    <text class="small" x="24" y="310">태그</text>
    <rect class="field" x="24" y="320" width="360" height="34" rx="4"/>
    <text class="tiny" x="40" y="342">fastapi, react, cors</text>
    <rect class="outline-button" x="400" y="320" width="132" height="34" rx="4"/>
    <text class="outline-text" x="428" y="342">AI 도움받기</text>
    <rect class="button" x="544" y="320" width="132" height="34" rx="4"/>
    <text class="button-text" x="590" y="342">저장</text>

    <rect class="ai" x="24" y="368" width="652" height="34" rx="4"/>
    <text class="tiny" x="40" y="390">AI 작성 도움 영역: 유사 글, 외부 자료, 질문 개선 제안 표시</text>
  </g>

  <!-- Login / Signup -->
  <g transform="translate(840 500)">
    <rect class="board" x="0" y="0" width="330" height="260" rx="8"/>
    <text class="panel-title" x="24" y="42">/login 로그인</text>
    <text class="small" x="24" y="78">이메일</text>
    <rect class="field" x="24" y="88" width="282" height="34" rx="4"/>
    <text class="small" x="24" y="148">비밀번호</text>
    <rect class="field" x="24" y="158" width="282" height="34" rx="4"/>
    <rect class="button" x="24" y="212" width="282" height="34" rx="4"/>
    <text class="button-text" x="141" y="234">로그인</text>

    <rect class="board" x="370" y="0" width="330" height="260" rx="8"/>
    <text class="panel-title" x="394" y="42">/signup 회원가입</text>
    <text class="small" x="394" y="76">이메일</text>
    <rect class="field" x="394" y="86" width="282" height="30" rx="4"/>
    <text class="small" x="394" y="136">닉네임</text>
    <rect class="field" x="394" y="146" width="282" height="30" rx="4"/>
    <text class="small" x="394" y="196">비밀번호</text>
    <rect class="field" x="394" y="206" width="282" height="30" rx="4"/>
  </g>

  <!-- Edit post -->
  <g transform="translate(840 820)">
    <rect class="board" x="0" y="0" width="700" height="300" rx="8"/>
    <text class="panel-title" x="24" y="42">/posts/:postId/edit 게시글 수정</text>
    <text class="small" x="24" y="76">기존 게시글을 불러온 뒤 작성자만 수정 가능</text>
    <rect class="field" x="24" y="102" width="652" height="38" rx="4"/>
    <text class="small" x="40" y="127">수정된 제목</text>
    <rect class="field" x="24" y="162" width="652" height="78" rx="4"/>
    <text class="tiny" x="40" y="190">수정된 본문</text>
    <rect class="outline-button" x="420" y="254" width="112" height="32" rx="4"/>
    <text class="outline-text" x="456" y="275">취소</text>
    <rect class="button" x="544" y="254" width="132" height="32" rx="4"/>
    <text class="button-text" x="590" y="275">저장</text>
  </g>

  <!-- Implementation note -->
  <g transform="translate(60 980)">
    <rect class="board" x="0" y="0" width="700" height="140" rx="8"/>
    <text class="panel-title" x="24" y="42">구현 순서</text>
    <text class="small" x="24" y="78">1. 목록 화면 → 2. 상세 화면 → 3. 작성 화면 → 4. 로그인/회원가입 → 5. 수정 화면</text>
    <text class="small" x="24" y="108">AI 작성 도움 영역은 자리만 먼저 만들고, RAG/MCP/Agent는 기본 CRUD 이후 연결한다.</text>
  </g>
</svg>
